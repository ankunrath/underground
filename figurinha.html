<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Figurinhas – Copa 2026</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #002868, #bf0a30);
        padding: 10px;
        color: #fff;
        margin: 0;
    }

    .container {
        width: 100%;
        max-width: 900px;
        margin: auto;
        background: #ffffffee;
        color: #000;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 0 12px #0006;
    }

    h1 {
        text-align: center;
        color: #002868;
        font-size: 1.6rem;
        margin-bottom: 15px;
    }

    input, button, select {
        padding: 12px;
        margin: 6px 0;
        width: 100%;
        font-size: 1rem;
        border-radius: 8px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    button {
        cursor: pointer;
        background: #002868;
        color: white;
        border: none;
        font-weight: bold;
    }

    button:hover {
        background: #bf0a30;
    }

    /* Tabela responsiva */
    .table-wrapper {
        overflow-x: auto;
        margin-top: 15px;
    }

    table {
        width: 100%;
        min-width: 500px;
        border-collapse: collapse;
    }

    th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
        font-size: 0.95rem;
    }

    th {
        background: #002868;
        color: white;
        cursor: pointer;
        white-space: nowrap;
    }

    .btn-small {
        padding: 8px 10px;
        font-size: 0.85rem;
        margin: 2px;
        border-radius: 6px;
        width: 60px;
    }

    /* Melhor toque no celular */
    @media (max-width: 480px) {
        h1 {
            font-size: 1.3rem;
        }

        .btn-small {
            width: 70px;
            padding: 10px;
            font-size: 0.9rem;
        }

        td {
            padding: 12px 6px;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h1>Álbum Copa do Mundo 2026 – Controle de Repetidas</h1>

    <label>Adicionar figurinha:</label>
    <input type="text" id="figInput" placeholder="Ex: 123, BR1, Mascote">
    <button onclick="adicionar()">Adicionar</button>

    <label>Buscar:</label>
    <input type="text" id="buscarInput" onkeyup="buscar()" placeholder="Digite para filtrar...">

    <h3>Total de repetidas: <span id="total">0</span></h3>

    <button onclick="compartilharTexto()">Compartilhar lista</button>
    <button onclick="copiarTexto()">Copiar lista</button>
    
    <button onclick="exportarExcel()">Exportar para Excel</button>

    <label style="margin-top:10px;">Importar lista (TXT ou CSV):</label>
    <input type="file" id="upload" accept=".txt,.csv" onchange="importarLista()">

    <table id="tabela">
        <thead>
            <tr>
                <th onclick="ordenar('nome')">Figurinha ⬍</th>
                <th onclick="ordenar('qtd')">Quantidade ⬍</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
// -------------------------------
// VARIÁVEIS E CARREGAMENTO
// -------------------------------
let figurinhas = {};
let ordem = "nome"; // padrão

window.onload = function() {
    const salvo = localStorage.getItem("copa2026");
    if (salvo) {
        figurinhas = JSON.parse(salvo);
        atualizarTabela();
    }
};

// -------------------------------
// SALVAR NO NAVEGADOR
// -------------------------------
function salvar() {
    localStorage.setItem("copa2026", JSON.stringify(figurinhas));
}

// -------------------------------
// ORDENAR TABELA
// -------------------------------
function ordenar(tipo) {
    ordem = tipo;
    atualizarTabela();
}

// -------------------------------
// ATUALIZAR TABELA
// -------------------------------
function atualizarTabela() {
    const tbody = document.querySelector("#tabela tbody");
    tbody.innerHTML = "";

    let lista = Object.keys(figurinhas);

    if (ordem === "nome") {
        lista.sort();
    } else {
        lista.sort((a, b) => figurinhas[b] - figurinhas[a]);
    }

    lista.forEach(fig => {
        let linha = `<tr>
            <td ondblclick="editar('${fig}')">${fig}</td>
            <td>${figurinhas[fig]}</td>
            <td>
                <button class="btn-small" onclick="alterarQtd('${fig}', 1)">+1</button>
                <button class="btn-small" onclick="alterarQtd('${fig}', -1)">-1</button>
                <button class="btn-small" onclick="removerTudo('${fig}')">Excluir</button>
            </td>
        </tr>`;
        tbody.innerHTML += linha;
    });

    document.getElementById("total").innerText =
        Object.values(figurinhas).reduce((a, b) => a + b, 0);

    salvar();
}

// -------------------------------
// ADICIONAR FIGURINHA
// -------------------------------
function adicionar() {
    let fig = document.getElementById("figInput").value.trim();
    if (fig === "") return;

    if (!figurinhas[fig]) figurinhas[fig] = 0;
    figurinhas[fig]++;

    document.getElementById("figInput").value = "";
    atualizarTabela();
}

// -------------------------------
// ALTERAR QUANTIDADE (+1 / -1)
// -------------------------------
function alterarQtd(fig, valor) {
    figurinhas[fig] += valor;

    if (figurinhas[fig] <= 0) {
        delete figurinhas[fig];
    }

    atualizarTabela();
}

// -------------------------------
// REMOVER TUDO (com confirmação)
// -------------------------------
function removerTudo(fig) {
    if (confirm(`Deseja remover TODAS as unidades da figurinha "${fig}"?`)) {
        delete figurinhas[fig];
        atualizarTabela();
    }
}

// -------------------------------
// EDITAR NOME DA FIGURINHA
// -------------------------------
function editar(fig) {
    let novo = prompt("Editar nome da figurinha:", fig);
    if (!novo || novo.trim() === "") return;

    novo = novo.trim();

    if (figurinhas[novo]) {
        alert("Já existe uma figurinha com esse nome!");
        return;
    }

    figurinhas[novo] = figurinhas[fig];
    delete figurinhas[fig];

    atualizarTabela();
}

// -------------------------------
// BUSCAR
// -------------------------------
function buscar() {
    let filtro = document.getElementById("buscarInput").value.toLowerCase();
    let linhas = document.querySelectorAll("#tabela tbody tr");

    linhas.forEach(linha => {
        let texto = linha.innerText.toLowerCase();
        linha.style.display = texto.includes(filtro) ? "" : "none";
    });
}

// -------------------------------
// EXPORTAR PARA EXCEL
// -------------------------------
function exportarExcel() {
    let conteudo = "Figurinha,Quantidade\n";

    for (let fig in figurinhas) {
        conteudo += `${fig},${figurinhas[fig]}\n`;
    }

    let blob = new Blob([conteudo], { type: "text/csv;charset=utf-8;" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "repetidas_copa2026.csv";
    a.click();
}

// -------------------------------
// IMPORTAR LISTA
// -------------------------------
function importarLista() {
    const arquivo = document.getElementById("upload").files[0];
    if (!arquivo) return;

    const leitor = new FileReader();

    leitor.onload = function(e) {
        const linhas = e.target.result.split(/\r?\n/);

        linhas.forEach(linha => {
            let fig = linha.trim();
            if (fig !== "") {
                if (!figurinhas[fig]) figurinhas[fig] = 0;
                figurinhas[fig]++;
            }
        });

        atualizarTabela();
    };

    leitor.readAsText(arquivo);
}
    // -------------------------------
// GERAR TEXTO DA LISTA
// -------------------------------
function gerarTexto() {
    let texto = "Minhas figurinhas repetidas – Copa 2026:\n\n";

    let lista = Object.keys(figurinhas).sort();

    lista.forEach(fig => {
        texto += `${fig}: ${figurinhas[fig]}\n`;
    });

    texto += `\nTotal: ${Object.values(figurinhas).reduce((a, b) => a + b, 0)}`;

    return texto;
}

// -------------------------------
// COMPARTILHAR (WhatsApp / nativo)
// -------------------------------
function compartilharTexto() {
    const texto = gerarTexto();

    if (navigator.share) {
        navigator.share({
            title: "Minhas repetidas – Copa 2026",
            text: texto
        });
    } else {
        // fallback para WhatsApp
        const url = "https://wa.me/?text=" + encodeURIComponent(texto);
        window.open(url, "_blank");
    }
}

// -------------------------------
// COPIAR PARA ÁREA DE TRANSFERÊNCIA
// -------------------------------
function copiarTexto() {
    const texto = gerarTexto();
    navigator.clipboard.writeText(texto)
        .then(() => alert("Lista copiada!"))
        .catch(() => alert("Erro ao copiar."));
}
</script>

</body>
</html>
