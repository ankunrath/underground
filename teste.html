<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Resultados da Copa 2026</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #e9eef3;
        padding: 20px;
    }

    .widget {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 14px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.15);
        border-top: 6px solid #1a73e8;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 26px;
        color: #1a73e8;
    }

    .match {
        padding: 14px;
        border-bottom: 1px solid #ddd;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: 0.2s;
    }

    .match:hover {
        background: #f7f9fc;
    }

    .teams {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: bold;
    }

    .flag {
        width: 28px;
        height: 20px;
        border-radius: 3px;
        object-fit: cover;
        border: 1px solid #ccc;
    }

    .score {
        font-size: 20px;
        font-weight: bold;
        color: #222;
    }

    .phase {
        margin-top: 25px;
        font-size: 18px;
        font-weight: bold;
        color: #444;
        border-left: 4px solid #1a73e8;
        padding-left: 10px;
    }
</style>
</head>
<body>

<div class="widget">
    <h2>Resultados da Copa 2026</h2>
    <div id="results"></div>
</div>

<script>
// ===============================
// EDITAR AQUI OS RESULTADOS
// ===============================
const jogos = [
    {
        fase: "Fase de Grupos",
        casa: "Brasil",
        bandeiraCasa: "https://flagcdn.com/w40/br.png",
        fora: "França",
        bandeiraFora: "https://flagcdn.com/w40/fr.png",
        placar: "2 x 1"
    },
    {
        fase: "Fase de Grupos",
        casa: "Argentina",
        bandeiraCasa: "https://flagcdn.com/w40/ar.png",
        fora: "México",
        bandeiraFora: "https://flagcdn.com/w40/mx.png",
        placar: "3 x 0"
    },
    {
        fase: "Fase de Grupos",
        casa: "Espanha",
        bandeiraCasa: "https://flagcdn.com/w40/es.png",
        fora: "Alemanha",
        bandeiraFora: "https://flagcdn.com/w40/de.png",
        placar: "1 x 1"
    }
];

// ===============================
// NÃO PRECISA MEXER DAQUI PRA BAIXO
// ===============================
function carregarResultados() {
    const container = document.getElementById("results");
    container.innerHTML = "";

    let faseAtual = "";

    jogos.forEach(jogo => {

        if (jogo.fase !== faseAtual) {
            faseAtual = jogo.fase;
            const faseDiv = document.createElement("div");
            faseDiv.className = "phase";
            faseDiv.textContent = faseAtual;
            container.appendChild(faseDiv);
        }

        const div = document.createElement("div");
        div.className = "match";
        div.innerHTML = `
            <div class="teams">
                <img class="flag" src="${jogo.bandeiraCasa}">
                ${jogo.casa}
                <span style="color:#888;">vs</span>
                ${jogo.fora}
                <img class="flag" src="${jogo.bandeiraFora}">
            </div>
            <div class="score">${jogo.placar}</div>
        `;
        container.appendChild(div);
    });
}

carregarResultados();
</script>

</body>
</html>
