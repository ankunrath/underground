<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Resultados da Copa 2026</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef2f5;
        padding: 20px;
    }

    .widget {
        max-width: 700px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 14px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.15);
        border-top: 6px solid #1a73e8;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 26px;
        color: #1a73e8;
    }

    .card {
        background: #f9fafc;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        transition: 0.2s;
    }

    .card:hover {
        background: #f1f5fb;
    }

    .team {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: bold;
    }

    .flag {
        width: 32px;
        height: 22px;
        border-radius: 3px;
        border: 1px solid #ccc;
        object-fit: cover;
    }

    .score {
        font-size: 22px;
        font-weight: bold;
        color: #222;
    }

    .warning {
        text-align: center;
        color: #777;
        margin-top: 20px;
    }
</style>
</head>
<body>

<div class="widget">
    <h2>Resultados da Copa 2026</h2>
    <div id="results">Carregando dados da Wikipedia...</div>
</div>

<script>
// Mapa de países -> códigos ISO para bandeiras
const bandeiras = {
    "Brasil": "br",
    "França": "fr",
    "Alemanha": "de",
    "Argentina": "ar",
    "México": "mx",
    "Espanha": "es",
    "Portugal": "pt",
    "Inglaterra": "gb",
    "Estados Unidos": "us",
    "Canadá": "ca",
    "Japão": "jp",
    "Coreia do Sul": "kr",
    "Itália": "it",
    "Holanda": "nl",
    "Uruguai": "uy",
    "Chile": "cl"
    // posso adicionar TODOS os países se quiser
};

async function carregarWikipedia() {
    const url =
        "https://pt.wikipedia.org/w/api.php?action=parse&page=Copa_do_Mundo_FIFA_de_2026&format=json&origin=*";

    try {
        const response = await fetch(url);
        const data = await response.json();

        const html = data.parse.text["*"];

        const temp = document.createElement("div");
        temp.innerHTML = html;

        // procura tabelas de jogos
        const tabelas = temp.querySelectorAll("table");

        const container = document.getElementById("results");
        container.innerHTML = "";

        if (tabelas.length === 0) {
            container.innerHTML =
                "<div class='warning'>A Wikipedia ainda não publicou os jogos da Copa 2026.</div>";
            return;
        }

        // percorre todas as tabelas e extrai jogos
        tabelas.forEach(tabela => {
            const linhas = tabela.querySelectorAll("tr");

            linhas.forEach(linha => {
                const colunas = linha.querySelectorAll("td");
                if (colunas.length < 3) return;

                const time1 = colunas[0].innerText.trim();
                const placar = colunas[1].innerText.trim();
                const time2 = colunas[2].innerText.trim();

                if (!time1 || !placar || !time2) return;

                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                    <div class="team">
                        <img class="flag" src="https://flagcdn.com/w40/${bandeiras[time1] || 'un'}.png">
                        ${time1}
                    </div>

                    <div class="score">${placar}</div>

                    <div class="team">
                        ${time2}
                        <img class="flag" src="https://flagcdn.com/w40/${bandeiras[time2] || 'un'}.png">
                    </div>
                `;

                container.appendChild(card);
            });
        });

    } catch (error) {
        document.getElementById("results").innerHTML =
            "Erro ao carregar dados da Wikipedia.";
        console.error(error);
    }
}

carregarWikipedia();
</script>

</body>
</html>
